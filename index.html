<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Shoping-cart page</title>
  </head>
  <body>
    <div class="bg-slate-200 min-h-screen">
      <!-- Head -->
      <div
        class="flex justify-around p-4 border-b-1 border-gray-300 bg-white shadow-lg shadow-black/10"
      >
        <div class="flex">
          <i class="fa-solid fa-fire text-emerald-300 text-3xl"></i>
          <!-- <i
            class="fa-solid fa-hand-middle-finger text-emerald-300 text-3xl"
          ></i> -->
          <p class="text-2xl">
            <span class="font-bold text-blue-900">Job</span> Passcard
          </p>
        </div>
        <div class="flex justify-between gap-8">
          <button class="text-black hover:text-emerald-300">ABOUT US</button>
          <button class="text-black hover:text-emerald-300">PASSCARD</button>
          <button class="text-black hover:text-emerald-300">PROPFILE</button>
        </div>
        <div class="flex justify-between gap-4 items-center">
          <button class="text-black hover:text-emerald-300">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
          <div class="flex">
            <button class="text-black hover:text-emerald-300">
              <i class="fa-solid fa-cart-shopping"></i>
            </button>
            <p class="absolute bg-red-600 p-1 rounded-full right-75"></p>
          </div>
          <button class="text-black hover:text-emerald-300">LOGIN</button>
          <button class="text-black hover:text-emerald-300">SIGN UP</button>
        </div>
      </div>
      <!-- Center Body -->
      <p class="text-4xl font-bold p-4 mt-20 ml-20">My Cart</p>
      <div class="flex items-stretch">
        <!-- sec -->
        <div class="flex flex-col justify-around">
          <div
            class="flex justify-around bg-white w-150 m-8 mx-20 rounded-3xl shadow-lg shadow-black/50"
          >
            <div class="p-6 flex justify-around gap-10 items-center">
              <div
                class="border-3 w-12 h-12 flex items-center justify-center rounded-full border-emerald-300 text-emerald-300 hover:text-blue-900 hover:border-blue-900"
              >
                <button>
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
              <div
                class="flex flex-col justify-around pl-4 pt-8 pb-16 h-42 w-42 bg-blue-500 text-white rounded-2xl"
              >
                <div
                  class="border-1 h-8 w-8 p-5 flex items-center justify-center text-blue-500 bg-white rounded-xl"
                >
                  <p><i class="fa-regular fa-file-lines"></i></p>
                </div>
                <p class="text-m font-extrabold">Google Docs</p>
                <p>Used for business</p>
              </div>
              <div class="flex flex-col justify-center gap-4">
                <p class="text-2xl">Google Docs</p>
                <div class="flex justify-around gap-1">
                  <p class="p-2 h-1 rounded-full bg-emerald-300"></p>
                  <p class="p-2 h-1 rounded-full bg-gray-200"></p>
                  <p class="bg-gray-200 p-2 h-1 rounded-full"></p>
                  <div>
                    <select>
                      <option>LV 1-3</option>
                      <option>LV 2-3</option>
                      <option>LV 3-3</option>
                    </select>
                  </div>
                </div>
                <p class="text-blue-900 text-xl">THB 150</p>
              </div>
            </div>
          </div>
          <!-- sec1 -->
          <div
            class="flex justify-around bg-white w-150 m-8 mx-20 rounded-3xl shadow-lg shadow-black/50"
          >
            <div class="p-6 flex justify-around gap-10 items-center">
              <div
                class="border-3 w-12 h-12 flex items-center justify-center rounded-full border-emerald-300 text-emerald-300 hover:text-blue-900 hover:border-blue-900"
              >
                <button>
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
              <div
                class="flex flex-col justify-around pl-4 pt-8 pb-16 h-42 w-42 bg-orange-400 text-white rounded-2xl"
              >
                <div
                  class="border-1 h-8 w-8 p-5 flex items-center justify-center text-orange-400 bg-white rounded-xl"
                >
                  <p><i class="fa-regular fa-file-lines"></i></p>
                </div>
                <p class="text-m font-extrabold">Google Slides</p>
                <p class="text-m">Used for business</p>
              </div>
              <div class="flex flex-col justify-center gap-4">
                <p class="text-2xl">Google Slides</p>
                <div class="flex justify-around gap-1">
                  <p class="bg-emerald-300 p-2 h-1 rounded-full"></p>
                  <p class="bg-emerald-300 p-2 h-1 rounded-full"></p>
                  <p class="bg-emerald-300 p-2 h-1 rounded-full"></p>
                  <p class="bg-gray-200 p-2 h-1 rounded-full"></p>
                  <div>
                    <select>
                      <option>LV 1-4</option>
                      <option>LV 2-4</option>
                      <option>LV 3-4</option>
                      <option>LV 4-4</option>
                    </select>
                  </div>
                </div>
                <p class="text-blue-900 text-xl">THB 150</p>
              </div>
            </div>
          </div>
        </div>
        <!-- sec2  -->
        <div
          class="bg-white mx-10 w-170 h-125 mt-8 rounded-3xl shadow-lg shadow-black/50"
        >
          <div class="flex flex-col items-center">
            <p class="text-3xl font-bold p-4 mt-8 ml-10 self-start">
              Order Info
            </p>
            <div class="flex justify-around gap-85">
              <p class="text-2xl text-gray-400">subtotal</p>
              <p class="text-2xl text-gray-600">THB 300</p>
            </div>
            <div class="flex justify-strar p-10 gap-8 items-center text-l">
              <p>
                <i class="fa-solid fa-ticket text-3xl text-emerald-300"></i>
              </p>
              <input
                type="text"
                placeholder="Promotion code"
                class="border-gray-300 border-1 w-68 h-13 p-2 rounded-md"
              />
              <button
                class="border-3 border-emerald-300 text-emerald-300 p-3 w-40 rounded-2xl hover:text-blue-900 hover:border-blue-900"
              >
                APPLY
              </button>
            </div>
            <div
              class="flex justify-around gap-70 text-2xl border-t-1 border-gray-300 pt-8"
            >
              <p>Total paytment</p>
              <p class="font-extrabold text-3xl text-emerald-300">THB 300</p>
            </div>
            <button
              class="h-14 w-131 mt-12 rounded-3xl bg-emerald-300 text-blue-900 font-extrabold hover:text-emerald-300 hover:bg-blue-900"
            >
              LOG IN TO CHECKOUT
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
